<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="賃貸併用住宅【IeーSma】イエスマ。あなたの家が、毎月お金を生む。初期費用0円で無料診断。">
<title>賃貸併用住宅【IeーSma】無料シミュレーション</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8883A;
  --orange-dark:#C96E22;
  --orange-pale:#FEF3EA;
  --charcoal:#222222;
  --slate:#555555;
  --muted:#888888;
  --border:#DEDEDE;
  --bg:#F5F5F5;
  --white:#FFFFFF;
  --cream:#FAFAFA;
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--charcoal);
  line-height:1.7;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.site-header{
  background:var(--white);
  border-bottom:3px solid var(--orange);
  padding:0 16px;
  display:flex;align-items:center;
  height:50px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
  flex-shrink:0;
}
.logo-en{color:var(--charcoal);font-size:17px;font-weight:700}
.logo-en span{color:var(--orange)}
.logo-ja{color:var(--muted);font-size:9px;letter-spacing:.1em;display:block;line-height:1.2}
.logo-tag{background:var(--orange);color:var(--white);font-size:8px;font-weight:700;padding:2px 6px;border-radius:2px;margin-left:8px;vertical-align:middle}

/* ===== CATCH BAND ===== */
.catch-band{
  background:var(--orange);
  padding:16px 20px 20px;
  text-align:center;
  flex-shrink:0;
  border-bottom:4px solid var(--orange-dark);
}
.catch-main{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(17px,4.5vw,24px);
  font-weight:900;
  color:var(--white);
  line-height:1.3;
}
.catch-main em{
  font-style:normal;
  font-size:clamp(20px,5.5vw,30px);
  display:block;
}
.catch-sub{
  color:rgba(255,255,255,.82);
  font-size:11px;
  margin-top:6px;
  letter-spacing:.04em;
}
.catch-badges{
  display:flex;justify-content:center;gap:7px;
  margin-top:10px;flex-wrap:wrap;
}
.catch-badge{
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.38);
  color:var(--white);
  font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  letter-spacing:.04em;
}

/* ===== FORM WRAP ===== */
.form-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  max-width:520px;
  width:100%;
  margin:0 auto;
  background:var(--white);
}

/* フォームヘッダー */
.form-head{
  background:var(--white);
  padding:16px 20px 14px;
  border-bottom:2px solid var(--border);
}
.form-head-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.form-step-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--orange);text-transform:uppercase}
.form-step-count{font-size:10px;color:var(--muted)}
.progress-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:4px;background:var(--orange);border-radius:2px;transition:width .4s ease}
.form-question{font-size:16px;font-weight:700;color:var(--charcoal);line-height:1.5}
.form-note{font-size:10px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:4px}

/* フォームボディ */
.form-body{padding:20px 16px 28px;flex:1}

/* 選択肢 */
.choice-col{display:flex;flex-direction:column;gap:10px}
.choice-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.choice-card{
  display:flex;align-items:center;gap:14px;
  border:1.5px solid var(--border);border-radius:6px;
  padding:16px;background:var(--cream);
  cursor:pointer;font-family:inherit;width:100%;text-align:left;
  transition:border-color .15s,background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.choice-card:active{transform:scale(.98)}
.choice-card:hover,.choice-card.selected{border-color:var(--orange);background:var(--orange-pale)}
.pict{width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.choice-label{font-size:15px;font-weight:700;color:var(--charcoal);display:block}
.choice-sub{font-size:11px;color:var(--muted);margin-top:2px;display:block}

.compact-btn{
  border:1.5px solid var(--border);border-radius:6px;
  padding:15px 10px;background:var(--cream);
  cursor:pointer;font-size:13px;font-weight:700;color:var(--charcoal);
  font-family:inherit;text-align:center;
  transition:border-color .15s,background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.compact-btn:active{transform:scale(.97)}
.compact-btn:hover,.compact-btn.selected{border-color:var(--orange);background:var(--orange-pale)}

/* 戻る */
.back-row{margin-top:14px}
.btn-back{
  background:none;border:1.5px solid var(--border);border-radius:5px;
  padding:10px 18px;color:var(--muted);
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:border-color .15s,color .15s;
}
.btn-back:hover{border-color:var(--slate);color:var(--slate)}

/* フィールド */
.fields-wrap{display:flex;flex-direction:column;gap:14px}
.field-label{font-size:11px;font-weight:700;color:var(--charcoal);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.req{background:#555;color:var(--white);font-size:9px;padding:1px 6px;border-radius:2px}
.input-field,.select-field{
  width:100%;padding:13px 14px;
  border:1.5px solid var(--border);border-radius:5px;
  font-size:15px;font-family:inherit;
  background:var(--cream);color:var(--charcoal);
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .15s;
}
.input-field:focus,.select-field:focus{border-color:var(--orange);background:var(--white)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.select-field{padding-right:36px}

.privacy-txt{text-align:center;font-size:10px;color:var(--muted);margin-top:14px;line-height:1.8}
.privacy-txt a{color:var(--orange);border-bottom:1px solid rgba(232,136,58,.3)}
.form-note-sub{font-size:11px;color:var(--slate);text-align:center;margin:10px 0 8px;line-height:1.7}

.btn-next-manual{
  width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--orange);border:none;border-radius:5px;
  padding:16px;color:var(--white);font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;letter-spacing:.04em;
  transition:background .15s;margin-top:14px;
}
.btn-next-manual:hover{background:var(--orange-dark)}

.btn-submit{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--orange);border:none;border-radius:5px;
  padding:18px 14px;color:var(--white);font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;letter-spacing:.02em;
  transition:background .15s;margin-top:8px;line-height:1.4;text-align:center;
}
.btn-submit:hover{background:var(--orange-dark)}

/* 完了 */
.completion{text-align:center;padding:36px 16px}
.completion-check{
  width:68px;height:68px;
  background:var(--orange-pale);border:2px solid var(--orange);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
}
.completion h3{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:900;color:var(--charcoal);margin-bottom:12px}
.completion-box{background:var(--orange-pale);border:1.5px solid var(--orange);border-radius:5px;padding:14px;margin:14px 0;font-size:13px;color:var(--charcoal);text-align:left}
.completion p{font-size:13px;color:var(--slate);line-height:1.8}

/* ===== FOOTER ===== */
footer{
  background:#222;border-top:3px solid var(--orange);
  padding:22px 20px;text-align:center;flex-shrink:0;
}
.footer-logo{font-size:16px;font-weight:700;color:var(--white);margin-bottom:3px}
.footer-logo span{color:var(--orange)}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:10px 0}
.footer-links a{color:rgba(255,255,255,.38);font-size:10px;border-bottom:1px solid rgba(255,255,255,.14);text-decoration:none}
.footer-copy{color:rgba(255,255,255,.18);font-size:9px;letter-spacing:.08em}

@media(min-width:520px){
  .catch-band{padding:20px 40px 16px}
}

/* ===== 理由づけコピー ===== */
.step-reason{
  font-size:11px;color:var(--muted);
  background:var(--bg);
  border-left:3px solid var(--orange);
  padding:7px 10px;border-radius:0 4px 4px 0;
  margin-bottom:14px;line-height:1.6;
}

/* ===== 励ましマイクロコピー ===== */
.cheer-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:nowrap;
  background:var(--orange-pale);
  border:1px solid rgba(232,136,58,.25);
  border-radius:6px;
  padding:10px 14px;
  margin-bottom:14px;
  font-size:12px;font-weight:700;color:var(--orange-dark);
  animation:fadeSlide .35s ease;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ===== 離脱防止ポップアップ ===== */
.exit-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.55);
  display:flex;align-items:flex-end;
  justify-content:center;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.exit-sheet{
  background:var(--white);
  width:100%;max-width:520px;
  border-radius:16px 16px 0 0;
  padding:28px 24px 36px;
  text-align:center;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.exit-sheet h3{
  font-family:'Noto Serif JP',serif;
  font-size:18px;font-weight:900;
  color:var(--charcoal);margin-bottom:8px;
}
.exit-sheet p{font-size:13px;color:var(--slate);margin-bottom:20px;line-height:1.7}
.exit-stay{
  width:100%;background:var(--orange);border:none;border-radius:6px;
  padding:16px;color:var(--white);font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;margin-bottom:10px;
  transition:background .15s;
}
.exit-stay:hover{background:var(--orange-dark)}
.exit-leave{
  width:100%;background:none;border:1.5px solid var(--border);border-radius:6px;
  padding:13px;color:var(--muted);font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:border-color .15s;
}
.exit-leave:hover{border-color:var(--slate);color:var(--slate)}

/* ===== バリデーションポップアップ ===== */
.valid-overlay{
  position:fixed;inset:0;z-index:10000;
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .18s ease;
}
.valid-sheet{
  background:var(--white);
  width:100%;max-width:340px;
  border-radius:12px;
  overflow:hidden;
  animation:popIn .22s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.valid-sheet-head{
  background:#E53E3E;
  padding:16px 20px 14px;
  display:flex;align-items:center;gap:10px;
}
.valid-sheet-head svg{flex-shrink:0}
.valid-sheet-title{color:var(--white);font-size:14px;font-weight:700}
.valid-sheet-body{padding:18px 20px 20px}
.valid-sheet-msg{font-size:13px;color:var(--charcoal);line-height:1.7;margin-bottom:16px}
.valid-sheet-msg strong{color:#E53E3E}
.valid-sheet-ok{
  width:100%;background:var(--orange);border:none;border-radius:5px;
  padding:13px;color:var(--white);font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:background .15s;
}
.valid-sheet-ok:hover{background:var(--orange-dark)}

/* インラインエラー */
.field-error{
  font-size:12px;color:#E53E3E;margin-top:6px;
  display:none;align-items:flex-start;gap:4px;
  background:#FFF5F5;border:1px solid rgba(229,62,62,.3);
  border-radius:4px;padding:8px 10px;line-height:1.5;
}
.field-error.visible{display:flex;}
.input-field.error,.select-field.error{border-color:#E53E3E;background:#FFF5F5}

/* ===== 郵便番号 → 住所自動入力 (zipcloud API) ===== */
function autoZip(val) {
  var zip = val.replace(/[^0-9]/g, '');
  var status = document.getElementById('zipStatus');
  if (!status) return;

  if (zip.length < 7) {
    if (zip.length > 0) {
      status.textContent = 'あと' + (7 - zip.length) + '桁入力してください';
      status.style.color = 'var(--muted)';
    } else {
      status.textContent = '';
    }
    return;
  }

  status.textContent = '検索中...';
  status.style.color = 'var(--muted)';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + zip, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      status.textContent = '通信エラーが発生しました。手動で入力してください。';
      status.style.color = '#E53E3E';
      return;
    }
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(e) {
      status.textContent = '通信エラーが発生しました。手動で入力してください。';
      status.style.color = '#E53E3E';
      return;
    }
    if (data.status !== 200 || !data.results) {
      status.textContent = '住所が見つかりませんでした。手動で入力してください。';
      status.style.color = '#E53E3E';
      return;
    }
    var res      = data.results[0];
    var prefName = res.address1;
    var city     = res.address2 + res.address3;

    // 都道府県セット
    var prefSel = document.getElementById('f_pref');
    if (prefSel) {
      for (var i = 0; i < prefSel.options.length; i++) {
        if (prefSel.options[i].text === prefName) {
          prefSel.selectedIndex = i;
          break;
        }
      }
      prefSel.classList.remove('error');
    }

    // 市区町村セット
    var cityEl = document.getElementById('f_city');
    if (cityEl) {
      cityEl.value = city;
      cityEl.classList.remove('error');
    }

// 成功メッセージ
    status.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:middle;margin-right:3px"><circle cx="6" cy="6" r="5.5" fill="#2D8C5E"/><path d="M3 6l2 2 4-4" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>住所を自動入力しました';
    status.style.color = '#2D8C5E';
  };
  xhr.onerror = function() {
    status.textContent = '通信エラーが発生しました。手動で入力してください。';
    status.style.color = '#E53E3E';
  };
  xhr.send();
}

// NGワード（下ネタ・不適切語）
const NG_WORDS = [
  'うんこ','うんち','ちんちん','まんこ','ちんぽ','ちんこ','おっぱい','セックス','sex',
  'ファック','fuck','shit','bitch','くそ','くそ野郎','死ね','ばか','アホ','カス',
  'きもい','うせろ','ふざけんな','ていのう','おまえ','てめえ'
];

function getMatchedNG(text) {
  var t = text.toLowerCase().replace(/[\s　]/g, '');
  for (var i = 0; i < NG_WORDS.length; i++) {
    if (t.indexOf(NG_WORDS[i].toLowerCase()) !== -1) return NG_WORDS[i];
  }
  return null;
}

function checkNameNG(el) {
  var val = el.value;
  var hint = document.getElementById('nameNgHint');
  var submitBtn = document.querySelector('.btn-submit');
  var matched = getMatchedNG(val);

  if (matched) {
    el.classList.add('error');
    if (hint) {
      hint.innerHTML =
        '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="flex-shrink:0;margin-top:1px">'
        + '<circle cx="6.5" cy="6.5" r="6" fill="#E53E3E"/>'
        + '<rect x="6" y="3" width="1" height="4" rx=".5" fill="white"/>'
        + '<circle cx="6.5" cy="9.5" r=".8" fill="white"/>'
        + '</svg>'
        + '<span><span style="font-weight:700">&ldquo;' + matched + '&rdquo;</span> は使用できません。<br>正しいお名前を入力してください。</span>';
      hint.classList.add('visible');
    }
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.4';
      submitBtn.style.cursor = 'not-allowed';
    }
  } else {
    el.classList.remove('error');
    if (hint) {
      hint.innerHTML = '';
      hint.classList.remove('visible');
    }
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      submitBtn.style.cursor = 'pointer';
    }
  }
}


function containsNG(text) {
  const t = text.toLowerCase().replace(/\s/g,'');
  return NG_WORDS.some(w => t.includes(w.toLowerCase()));
}

// ===== 電話番号バリデーション =====
// 仕様:
//   許可: 050/070/080/090 から始まる11桁のみ
//   下8桁エラー:
//     1. 同じ数字の繰り返し (例: 88888888)
//     2. 数字と0の交互パターン (例: 90909090)
//     3. 連続する数字・循環連続含む (例: 12345678, 45678901)
//     4. 4桁以上同じ数字が連続 (例: 11112222, 11122222)

function validateTel(tel) {
  var t = tel.replace(/[-\s]/g, '');

  // 1. 11桁の数字のみ
  if (!/^\d{11}$/.test(t)) {
    return {ok:false, msg:'電話番号は<strong>11桁の数字</strong>で入力してください。<br>例：09056781234'};
  }

  // 2. 050/070/080/090 から始まること
  if (!/^(050|070|080|090)/.test(t)) {
    return {ok:false, msg:'電話番号は<strong>050・070・080・090</strong>から始まる番号を入力してください。'};
  }

  // 下8桁を取得
  var d = t.slice(3);

  // 3. 同じ数字の繰り返し（例：88888888）
  if (/^(\d)\1{7}$/.test(d)) {
    return {ok:false, msg:'正しい電話番号を入力してください。<br>（同じ数字の繰り返しは無効です）'};
  }

  // 4. 数字と0の交互パターン（例：90909090, 60606060）
  if (/^(\d0){4}$/.test(d) || /^(0\d){4}$/.test(d)) {
    return {ok:false, msg:'正しい電話番号を入力してください。<br>（交互パターンは無効です）'};
  }

  // 5. 連続する数字・循環連続含む（例：12345678, 87654321, 45678901）
  var seq  = '01234567890123456789';
  var seqR = '98765432109876543210';
  if (seq.indexOf(d) !== -1 || seqR.indexOf(d) !== -1) {
    return {ok:false, msg:'正しい電話番号を入力してください。<br>（連続する数字は無効です）'};
  }

  // 6. 4桁以上同じ数字が連続（例：11112222, 11122222, 22221111）
  if (/(\d)\1{3}/.test(d)) {
    return {ok:false, msg:'正しい電話番号を入力してください。<br>（数字の繰り返しパターンは無効です）'};
  }

  return {ok:true};
}


function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  if(!re.test(email)) {
    return {ok:false, msg:'メールアドレスの形式が正しくありません。<br>例：<strong>taro@example.com</strong>'};
  }
  return {ok:true};
}

// 名前バリデーション（NGワード）
function validateName(name) {
  if(!name.trim()) {
    return {ok:false, msg:'お名前を入力してください。'};
  }
  if(containsNG(name)) {
    return {ok:false, msg:'お名前に<strong>不適切な表現</strong>が含まれています。<br>正式なお名前を入力してください。'};
  }
  if(name.trim().length < 2) {
    return {ok:false, msg:'お名前は<strong>2文字以上</strong>で入力してください。'};
  }
  return {ok:true};
}

// submitFormを上書き
function submitForm() {
  const nameEl  = document.getElementById('f_name');
  const telEl   = document.getElementById('f_tel');
  const emailEl = document.getElementById('f_email');

  // リセット
  [nameEl, telEl, emailEl].forEach(el => el && el.classList.remove('error'));

  const name  = nameEl  ? nameEl.value.trim()  : '';
  const tel   = telEl   ? telEl.value.trim()   : '';
  const email = emailEl ? emailEl.value.trim() : '';

  if(!name || !tel || !email) {
    showValidPopup('未入力の項目があります', '全ての項目を入力してください。');
    return;
  }

  // 名前チェック（NGワード含む）
  if(containsNG(name)) {
    nameEl.classList.add('error');
    nameEl.focus();
    var hint = document.getElementById('nameNgHint');
    if(hint) hint.classList.add('visible');
    showValidPopup('お名前を確認してください', '不適切な表現が含まれています。<br>正式なお名前を入力してください。');
    return;
  }
  const nameRes = validateName(name);
  if(!nameRes.ok) {
    nameEl.classList.add('error');
    nameEl.focus();
    showValidPopup('お名前を確認してください', nameRes.msg);
    return;
  }

  // 電話番号チェック
  const telRes = validateTel(tel);
  if(!telRes.ok) {
    telEl.classList.add('error');
    telEl.focus();
    showValidPopup('電話番号を確認してください', telRes.msg);
    return;
  }

  // メールチェック
  const emailRes = validateEmail(email);
  if(!emailRes.ok) {
    emailEl.classList.add('error');
    emailEl.focus();
    showValidPopup('メールアドレスを確認してください', emailRes.msg);
    return;
  }

  // フォームデータを収集
  formAnswers.name  = name;
  formAnswers.tel   = tel;
  formAnswers.email = email;

  // キントーンへ送信
  sendToKintone(formAnswers)
    .then(function() {
      console.log('kintone送信成功');
    })
    .catch(function(e) {
      console.warn('kintone送信エラー:', e.message);
      // 送信失敗でも完了画面は表示する
    });

  // Google広告コンバージョン計測
  if(typeof gtag !== 'undefined') {
    gtag('event', 'conversion', {
      'send_to': GOOGLE_ADS_ID + '/' + GOOGLE_CV_LABEL
    });
  }

  // Meta広告コンバージョン計測
  if(typeof fbq !== 'undefined') {
    fbq('track', 'Lead', {
      content_name: '賃貸併用住宅診断',
      content_category: 'IeSma'
    });
  }

  // 完了画面へ
  showDone();
}

// キントーンへ送信する関数
function sendToKintone(formData) {
  var url = 'https://' + KINTONE_SUBDOMAIN + '.cybozu.com/k/v1/record.json';
  var record = {
    '住まい':      { value: formData.step1  || '' },
    '購入時期':    { value: formData.step2  || '' },
    '年齢':        { value: formData.step3  || '' },
    '働き方':      { value: formData.step4  || '' },
    '世帯年収':    { value: formData.step5  || '' },
    '借入額':      { value: formData.step6  || '' },
    '都道府県':    { value: formData.pref   || '' },
    '市区町村':    { value: formData.city   || '' },
    '氏名':        { value: formData.name   || '' },
    '電話番号':    { value: formData.tel    || '' },
    'メール':      { value: formData.email  || '' }
  };
  return fetch(url, {
    method: 'POST',
    headers: {
      'X-Cybozu-API-Token': KINTONE_API_TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ app: KINTONE_APP_ID, record: record })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('kintone error: ' + r.status);
    return r.json();
  });
}
